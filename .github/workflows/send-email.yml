name: Send Email Notification

on:
  workflow_dispatch:
    inputs:
      subject:
        description: Email subject
        required: true
        type: string
      body:
        description: Email body (plain text)
        required: true
        type: string
      to:
        description: Recipient email (defaults to NOTIFY_EMAIL)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ inputs.to || 'hm0163983@gmail.com' }}
          SUBJECT: ${{ inputs.subject }}
          BODY: ${{ inputs.body }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, time
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          user  = os.environ["GMAIL_USER"]
          pwd   = os.environ["GMAIL_APP_PASSWORD"]
          to    = os.environ["TO_EMAIL"]
          subj  = os.environ["SUBJECT"]
          body  = os.environ["BODY"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subj
          msg["From"]    = f"Sunzone Indexing Bot <{user}>"
          msg["To"]      = to

          # Plain text part
          msg.attach(MIMEText(body, "plain"))

          last_error = None
          for attempt in range(1, 4):
              try:
                  with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
                      s.login(user, pwd)
                      s.sendmail(user, [to], msg.as_string())
                  print(f"Email sent to {to}: {subj}")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"Email attempt {attempt}/3 failed: {exc}")
                  if attempt < 3:
                      time.sleep(10)
          else:
              raise SystemExit(f"Email could not be sent: {last_error}")
          EOF
