name: Sunzone Prospect Flow - Morning Kickoff Guard

on:
  schedule:
    # Redundant morning guard windows in IST:
    # 7:40, 7:55, 8:10, 8:25, 8:40, 8:55 AM Mon-Sat.
    # This protects against a delayed or dropped GitHub schedule event.
    - cron: "10 2 * * 1-6"
    - cron: "25 2 * * 1-6"
    - cron: "40 2 * * 1-6"
    - cron: "55 2 * * 1-6"
    - cron: "10 3 * * 1-6"
    - cron: "25 3 * * 1-6"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NOTIFY_EMAIL: "hmehta4851@gmail.com"

permissions:
  actions: write
  contents: read

concurrency:
  group: sunzone-morning-kickoff
  cancel-in-progress: true

jobs:
  kickoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check and start today's collection if missing
        id: kickoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking daily collection for $TODAY..."

          RUNS=""
          for attempt in 1 2 3; do
            if RUNS=$(gh run list \
              --repo ${{ github.repository }} \
              --workflow daily.yml \
              --limit 20 \
              --json databaseId,status,conclusion,createdAt,url \
              --jq "[.[] | select(.createdAt | startswith(\"$TODAY\"))]"); then
              break
            fi
            echo "Daily run lookup attempt $attempt/3 failed."
            sleep $((attempt * 10))
          done

          if [ -z "$RUNS" ]; then
            echo "Could not read today's daily run health after three attempts."
            exit 1
          fi

          echo "Today's daily runs: $RUNS"

          DECISION=$(echo "$RUNS" | python3 -c '
          import json, sys
          runs = json.load(sys.stdin)
          if not isinstance(runs, list):
              raise SystemExit("GitHub run response was not a list")
          active = [
              run for run in runs
              if run.get("status") in {"in_progress", "queued", "pending"}
          ]
          successful = [
              run for run in runs
              if run.get("status") == "completed"
              and run.get("conclusion") == "success"
          ]
          if active:
              print("already_active")
          elif successful:
              print("already_success")
          else:
              print("dispatch")
          ')

          echo "Decision: $DECISION"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"

          if [ "$DECISION" != "dispatch" ]; then
            echo "No kickoff needed."
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Dispatching daily collection attempt $attempt/3..."
            if gh workflow run daily.yml --repo ${{ github.repository }}; then
              echo "dispatched=true" >> "$GITHUB_OUTPUT"
              echo "Daily collection dispatch accepted."
              exit 0
            fi
            sleep $((attempt * 10))
          done

          echo "dispatched=false" >> "$GITHUB_OUTPUT"
          echo "Daily collection dispatch failed after three attempts."
          exit 1

      - name: Send kickoff email
        if: steps.kickoff.outputs.dispatched == 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os
          import smtplib
          import time
          from email.mime.text import MIMEText

          msg = MIMEText(
              "Sunzone Prospect Flow noticed that today's daily collection had "
              "not started during the morning guard window.\n\n"
              "Action taken: the guard automatically started the daily "
              "collection workflow.\n\n"
              "No action is required from you. Leads will appear in the Google "
              "Sheet after the collection run completes.\n\n"
              "Technical review:\n"
              "https://github.com/hm0163983-sudo/lead-scraper/actions"
          )
          msg["Subject"] = "[Sunzone Prospect Flow] Morning kickoff started collection"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]

          last_error = None
          for attempt in range(1, 4):
              try:
                  with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as server:
                      server.login(
                          os.environ["GMAIL_USER"],
                          os.environ["GMAIL_APP_PASSWORD"],
                      )
                      server.sendmail(
                          os.environ["GMAIL_USER"],
                          [os.environ["NOTIFY_EMAIL"]],
                          msg.as_string(),
                      )
                  print("Morning kickoff email sent.")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"Morning kickoff email attempt {attempt}/3 failed: {exc}")
                  if attempt < 3:
                      time.sleep(10)
          else:
              raise SystemExit(f"Morning kickoff email could not be sent: {last_error}")
          EOF
