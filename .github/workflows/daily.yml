name: Daily Lead Scraper

on:
  schedule:
    - cron: "30 2 * * 1-6"  # 8:00 AM IST Mon–Sat (UTC+5:30, 0=Sun)
  workflow_dispatch:       # manual trigger button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write          # needed for Workload Identity Federation

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/505761337329/locations/global/workloadIdentityPools/github-actions/providers/github-actions"
          service_account: "lead-scraper@turnkey-pottery-499205-u2.iam.gserviceaccount.com"

      - name: Run scraper
        id: run_scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "hmehta4851@gmail.com"
        run: python main.py

      - name: Send failure alert
        if: failure() && steps.run_scraper.outcome == 'failure'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "hmehta4851@gmail.com"
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText(
              "The lead scraper FAILED today and did not collect leads.\n\n"
              "Please check GitHub Actions for details:\n"
              "https://github.com/hm0163983-sudo/lead-scraper/actions\n\n"
              "You can manually re-trigger from the Actions tab."
          )
          msg["Subject"] = "[Lead Scraper] FAILED — manual re-run needed"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
          print("Failure alert sent.")
          EOF

      - name: Commit state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update city rotation state [skip ci]"
          git push
