name: Daily Lead Scraper

on:
  schedule:
    - cron: "30 2 * * *"  # 8:00 AM IST (UTC+5:30)
  workflow_dispatch:       # manual trigger button

permissions:
  contents: write
  id-token: write          # needed for Workload Identity Federation

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Auth option A: Workload Identity Federation (no JSON key needed) ──
      # Uncomment this block once WIF provider is set up in GCP.
      # Remove GOOGLE_SERVICE_ACCOUNT_JSON secret when using this.
      #
      # - name: Authenticate to GCP via WIF
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: "projects/505761337329/locations/global/workloadIdentityPools/github-actions/providers/github"
      #     service_account: "lead-scraper@turnkey-pottery-499205-u2.iam.gserviceaccount.com"

      - name: Run scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "hmehta4851@gmail.com"
        run: python main.py

      - name: Commit state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update city rotation state [skip ci]"
          git push
