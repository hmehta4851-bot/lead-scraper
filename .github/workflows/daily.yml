name: Sunzone Prospect Flow - Daily Collection

on:
  schedule:
    # Use an uncommon minute because GitHub schedules near common clock
    # boundaries are more likely to be delayed under platform load.
    - cron: "17 2 * * 1-6"  # 7:47 AM IST Mon-Sat (UTC+5:30, 0=Sun)
  workflow_dispatch:       # manual trigger button

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sunzone-lead-scraper
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write          # needed for Workload Identity Federation

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Prepare private temporary directory
        run: |
          private_tmp="$RUNNER_TEMP/sunzone-private-tmp"
          mkdir -p "$private_tmp"
          chmod 700 "$private_tmp"
          echo "TMPDIR=$private_tmp" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: "projects/505761337329/locations/global/workloadIdentityPools/github-actions/providers/github-actions"
          service_account: "lead-scraper@turnkey-pottery-499205-u2.iam.gserviceaccount.com"

      - name: Run production readiness preflight
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python preflight.py

      - name: Run Sunzone Prospect Flow
        id: run_scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "hmehta4851@gmail.com"
        run: |
          set +e
          python main.py
          status=$?
          if [ "$status" -eq 1 ]; then
            echo "Unexpected failure — retrying once in 60s..."
            sleep 60
            python main.py
            status=$?
          fi
          set -e
          if [ "$status" -eq 2 ]; then
            echo "Verified quota shortfall — automatic recovery is required."
          fi
          exit "$status"

      - name: Send immediate failure alert
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "hmehta4851@gmail.com"
        run: |
          python - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText(
              "Sunzone Prospect Flow could not complete today's collection.\n\n"
              "The self-healing watchdog will retry automatically. No routine action is needed.\n\n"
              "This alert also covers setup, authentication, preflight and scraper-stage failures.\n\n"
              "Technical details:\n"
              "https://github.com/hm0163983-sudo/lead-scraper/actions\n\n"
              "You only need to investigate if a later recovery email says all automatic attempts failed."
          )
          msg["Subject"] = "[Sunzone Prospect Flow] Recovery started automatically"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
          print("Failure alert sent.")
          EOF

      - name: Commit state.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update city rotation state [skip ci]"
          git pull --rebase origin main
          git push
