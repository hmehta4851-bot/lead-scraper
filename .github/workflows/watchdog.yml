name: Sunzone Prospect Flow - Self-Healing Watchdog

on:
  schedule:
    # Early checks recover a daily cron that GitHub delayed or dropped.
    # Later checks recover a failed or quota-short collection.
    - cron: "47 2 * * 1-6"  # 8:17 AM IST Mon-Sat
    - cron: "17 3 * * 1-6"  # 8:47 AM IST Mon-Sat
    - cron: "17 5 * * 1-6"  # 10:47 AM IST Mon-Sat
    - cron: "17 9 * * 1-6"  # 2:47 PM IST Mon-Sat
  workflow_run:
    workflows: ["Sunzone Prospect Flow - Daily Collection"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: sunzone-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOTIFY_EMAIL: "hmehta4851@gmail.com"

    steps:
      - name: Check today's Sunzone Prospect Flow health
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking Sunzone Prospect Flow runs on $TODAY..."

          # Get most recent daily scraper run
          RUNS=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow daily.yml \
            --limit 10 \
            --json databaseId,status,conclusion,createdAt \
            --jq "[.[] | select(.createdAt | startswith(\"$TODAY\"))]")

          echo "Runs today: $RUNS"

          read -r STATUS CONCLUSION ATTEMPTS <<< "$(echo "$RUNS" | python3 -c '
          import json, sys
          runs = json.load(sys.stdin)
          if not isinstance(runs, list):
              raise SystemExit("GitHub run response was not a list")
          active = next(
              (
                  run for run in runs
                  if run.get("status") in {"in_progress", "queued", "pending"}
              ),
              None,
          )
          successful = next(
              (
                  run for run in runs
                  if run.get("status") == "completed"
                  and run.get("conclusion") == "success"
              ),
              None,
          )
          # "cancelled" runs are maintenance replacements, not failures.
          genuine_failures = [
              run for run in runs
              if run.get("status") == "completed"
              and run.get("conclusion")
              in {
                  "failure",
                  "timed_out",
                  "action_required",
                  "startup_failure",
              }
          ]
          selected = active or successful or (runs[0] if runs else {})
          print(
              selected.get("status", "none"),
              selected.get("conclusion") or "none",
              len(genuine_failures),
          )
          ')"

          case "$ATTEMPTS" in
            ''|*[!0-9]*) echo "Invalid attempt count"; exit 1 ;;
          esac

          echo "Status: $STATUS | Conclusion: $CONCLUSION | Genuine failures: $ATTEMPTS"

          if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "Run succeeded today — nothing to do."
          elif [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "Run is still in progress — nothing to do."
          elif [ "$ATTEMPTS" -ge 3 ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=true" >> $GITHUB_OUTPUT
            echo "Automatic recovery limit reached after three genuine failures."
          else
            echo "need_rerun=true" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "No successful run found today — triggering auto-heal."
          fi

      - name: Auto-trigger daily scraper
        if: steps.check.outputs.need_rerun == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering Sunzone Prospect Flow (watchdog auto-heal)..."
          gh workflow run daily.yml --repo ${{ github.repository }}
          echo "Triggered successfully."

      - name: Send watchdog alert email
        if: steps.check.outputs.need_rerun == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText(
              "Sunzone Prospect Flow detected an incomplete collection run.\n\n"
              "Action taken: the watchdog automatically started a recovery run.\n\n"
              "No action needed from you — the system is healing itself.\n\n"
              "Leads will appear in your Google Sheet once the re-triggered run completes.\n\n"
              "─────────────────────────────\n"
              "Sunzone Prospect Flow Automation\n"
              "Self-healing watchdog system"
          )
          msg["Subject"] = "[Sunzone Prospect Flow] Automatic recovery run started"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
          print("Watchdog alert sent.")
          EOF

      - name: Send recovery limit alert
        if: github.event_name == 'workflow_run' && steps.check.outputs.recovery_exhausted == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText(
              "Sunzone Prospect Flow attempted automatic recovery three times today, "
              "but no successful run was recorded.\n\n"
              "The system stopped retrying to avoid duplicate or uncontrolled jobs. "
              "Existing sheet data remains protected.\n\n"
              "Technical review link:\n"
              "https://github.com/hm0163983-sudo/lead-scraper/actions"
          )
          msg["Subject"] = "[Sunzone Prospect Flow] Automatic recovery limit reached"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
          print("Recovery limit alert sent.")
          EOF
