name: Sunzone Prospect Flow - Self-Healing Watchdog

on:
  schedule:
    # Early checks recover a daily cron that GitHub delayed or dropped.
    # Later checks recover a failed or quota-short collection.
    - cron: "47 2 * * 1-6"  # 8:17 AM IST Mon-Sat
    - cron: "17 3 * * 1-6"  # 8:47 AM IST Mon-Sat
    - cron: "17 5 * * 1-6"  # 10:47 AM IST Mon-Sat
    - cron: "17 9 * * 1-6"  # 2:47 PM IST Mon-Sat
  workflow_run:
    workflows: ["Sunzone Prospect Flow - Daily Collection"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write

concurrency:
  group: sunzone-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NOTIFY_EMAIL: "hmehta4851@gmail.com"

    steps:
      - name: Check today's Sunzone Prospect Flow health
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking Sunzone Prospect Flow runs on $TODAY..."

          # Get most recent daily scraper run
          RUNS=""
          for attempt in 1 2 3; do
            if RUNS=$(gh run list \
              --repo ${{ github.repository }} \
              --workflow daily.yml \
              --limit 10 \
              --json databaseId,status,conclusion,createdAt \
              --jq "[.[] | select(.createdAt | startswith(\"$TODAY\"))]"); then
              break
            fi
            echo "GitHub health lookup attempt $attempt/3 failed."
            sleep $((attempt * 10))
          done
          if [ -z "$RUNS" ]; then
            echo "Could not read today's workflow health after three attempts."
            exit 1
          fi

          echo "Runs today: $RUNS"

          read -r STATUS CONCLUSION ATTEMPTS <<< "$(echo "$RUNS" | python3 -c '
          import json, sys
          runs = json.load(sys.stdin)
          if not isinstance(runs, list):
              raise SystemExit("GitHub run response was not a list")
          active = next(
              (
                  run for run in runs
                  if run.get("status") in {"in_progress", "queued", "pending"}
              ),
              None,
          )
          successful = next(
              (
                  run for run in runs
                  if run.get("status") == "completed"
                  and run.get("conclusion") == "success"
              ),
              None,
          )
          # "cancelled" runs are maintenance replacements, not failures.
          genuine_failures = [
              run for run in runs
              if run.get("status") == "completed"
              and run.get("conclusion")
              in {
                  "failure",
                  "timed_out",
                  "action_required",
                  "startup_failure",
              }
          ]
          selected = active or successful or (runs[0] if runs else {})
          print(
              selected.get("status", "none"),
              selected.get("conclusion") or "none",
              len(genuine_failures),
          )
          ')"

          case "$ATTEMPTS" in
            ''|*[!0-9]*) echo "Invalid attempt count"; exit 1 ;;
          esac

          echo "Status: $STATUS | Conclusion: $CONCLUSION | Genuine failures: $ATTEMPTS"

          if [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "success" ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "Run succeeded today — nothing to do."
          elif [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "Run is still in progress — nothing to do."
          elif [ "$STATUS" = "completed" ] && [ "$CONCLUSION" = "cancelled" ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "Latest run was manually cancelled — staying stopped today."
          elif [ "$ATTEMPTS" -ge 3 ]; then
            echo "need_rerun=false" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=true" >> $GITHUB_OUTPUT
            echo "Automatic recovery limit reached after three genuine failures."
          else
            echo "need_rerun=true" >> $GITHUB_OUTPUT
            echo "recovery_exhausted=false" >> $GITHUB_OUTPUT
            echo "No successful run found today — triggering auto-heal."
          fi

      - name: Auto-trigger daily scraper
        id: dispatch
        if: steps.check.outputs.need_rerun == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3; do
            echo "Triggering Sunzone Prospect Flow, attempt $attempt/3..."
            if gh workflow run daily.yml --repo ${{ github.repository }}; then
              echo "dispatched=true" >> "$GITHUB_OUTPUT"
              echo "Triggered successfully."
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "dispatched=false" >> "$GITHUB_OUTPUT"
          echo "Recovery dispatch failed after three attempts."
          exit 1

      - name: Send watchdog alert email
        if: always() && steps.check.outputs.need_rerun == 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DISPATCHED: ${{ steps.dispatch.outputs.dispatched }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, time
          from email.mime.text import MIMEText
          dispatched = os.environ.get("DISPATCHED") == "true"
          if dispatched:
              subject = "[Sunzone Prospect Flow] Automatic recovery run started"
              action = (
                  "Action taken: the watchdog automatically started a recovery run.\n\n"
                  "No action needed from you — the system is healing itself.\n\n"
                  "Leads will appear in your Google Sheet once the re-triggered run completes."
              )
          else:
              subject = "[Sunzone Prospect Flow] Recovery dispatch will retry"
              action = (
                  "The watchdog could not start a recovery run after three GitHub attempts.\n\n"
                  "The next scheduled watchdog check will try again automatically. "
                  "Existing Sheet data remains protected."
              )
          msg = MIMEText(
              "Sunzone Prospect Flow detected an incomplete collection run.\n\n"
              + action
              + "\n\n─────────────────────────────\n"
              "Sunzone Prospect Flow Automation\n"
              "Self-healing watchdog system"
          )
          msg["Subject"] = subject
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          last_error = None
          for attempt in range(1, 4):
              try:
                  with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
                      s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
                      s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
                  print("Watchdog alert sent.")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"Watchdog email attempt {attempt}/3 failed: {exc}")
                  if attempt < 3:
                      time.sleep(10)
          else:
              raise SystemExit(f"Watchdog alert could not be sent: {last_error}")
          EOF

      - name: Send recovery limit alert
        if: steps.check.outputs.recovery_exhausted == 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import smtplib, os, time
          from email.mime.text import MIMEText
          msg = MIMEText(
              "Sunzone Prospect Flow attempted automatic recovery three times today, "
              "but no successful run was recorded.\n\n"
              "The system stopped retrying to avoid duplicate or uncontrolled jobs. "
              "Existing sheet data remains protected.\n\n"
              "Technical review link:\n"
              "https://github.com/hm0163983-sudo/lead-scraper/actions"
          )
          msg["Subject"] = "[Sunzone Prospect Flow] Automatic recovery limit reached"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["NOTIFY_EMAIL"]
          last_error = None
          for attempt in range(1, 4):
              try:
                  with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=30) as s:
                      s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
                      s.sendmail(os.environ["GMAIL_USER"], [os.environ["NOTIFY_EMAIL"]], msg.as_string())
                  print("Recovery limit alert sent.")
                  break
              except Exception as exc:
                  last_error = exc
                  print(f"Recovery-limit email attempt {attempt}/3 failed: {exc}")
                  if attempt < 3:
                      time.sleep(10)
          else:
              raise SystemExit(f"Recovery-limit alert could not be sent: {last_error}")
          EOF

      - name: Mark failed recovery dispatch
        if: always() && steps.check.outputs.need_rerun == 'true' && steps.dispatch.outputs.dispatched != 'true'
        run: |
          echo "Recovery dispatch did not succeed; a later watchdog will retry."
          exit 1
